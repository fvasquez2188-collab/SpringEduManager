<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Estudiantes</title>
    <!-- css -->
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    
    <!-- bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- sweet alert -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">📚 EduManager</div>

    <div class="nav-links" id="navLinks">
        <a th:href="@{/cursos}">Cursos</a>
        <a th:href="@{/estudiantes}">Estudiantes</a>
        <a th:href="@{/cursos/nuevo}">Nuevo Curso</a>
        <a th:href="@{/estudiantes/nuevo}">Nuevo Estudiante</a>
        <a href="#" onclick="confirmarLogout()" class="btn-logout">Salir</a>
    </div>

    <div class="menu-toggle" onclick="toggleMenu()">☰</div>
</div>

<!-- CONTENIDO -->
<div class="container">

    <h2>📋 Lista de Estudiantes</h2>

    <a th:href="@{/estudiantes/nuevo}" class="btn">➕ Nuevo Estudiante</a>

    <table class="table table-striped table-hover shadow">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Email</th>
                <th>Curso</th>
                <th>Acciones</th>
            </tr>
        </thead>

        <tbody>
            <tr th:each="e : ${estudiantes}">
                <td th:text="${e.id}"></td>
                <td th:text="${e.nombre}"></td>
                <td th:text="${e.email}"></td>
                <td th:text="${e.curso.nombre}"></td>
                <td>
    				<a th:href="@{/estudiantes/editar/{id}(id=${e.id})}" class="btn">✏️ Editar</a>

    				<a href="#"
     				  class="btn"
       					th:onclick="'confirmarEliminacion(' + ${e.id} + ')'">
       					🗑 Eliminar
    				</a>
				</td>
            </tr>
        </tbody>
    </table>

</div>

<!-- SCRIPTS -->
<script>
function toggleMenu() {
    document.getElementById("navLinks").classList.toggle("active");
}

function confirmarEliminacion(id) {
    Swal.fire({
        title: "¿Estás seguro?",
        text: "Esta acción no se puede deshacer",
        icon: "warning",
        showCancelButton: true,
        confirmButtonText: "Sí, eliminar",
        cancelButtonText: "Cancelar"
    }).then((result) => {
        if (result.isConfirmed) {
            window.location.href = "/estudiantes/eliminar/" + id;
        }
    });
}

function confirmarLogout() {
    Swal.fire({
        title: "¿Cerrar sesión?",
        text: "Serás redirigido al login",
        icon: "question",
        showCancelButton: true,
        confirmButtonText: "Sí, salir",
        cancelButtonText: "Cancelar"
    }).then((result) => {
        if (result.isConfirmed) {
            window.location.href = "/logout";
        }
    });
}
</script>

<!-- MENSAJE ELIMINADO -->
<script th:if="${param.eliminado}">
    Swal.fire("Eliminado", "Estudiante eliminado correctamente", "success");
</script>

</body>
</html>
