<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Nuevo Estudiante</title>
    
    <!-- css -->
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    
    <!-- bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- sweet alert -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">

    <div class="logo">
        📚 EduManager
    </div>

    <div class="nav-links" id="navLinks">
        <a th:href="@{/cursos}">Cursos</a>
        <a th:href="@{/estudiantes}">Estudiantes</a>
        <a th:href="@{/cursos/nuevo}">Nuevo Curso</a>
        <a th:href="@{/estudiantes/nuevo}">Nuevo Estudiante</a>
        <a th:href="@{/logout}" class="btn-logout">Salir</a>
    </div>

    <div class="menu-toggle" onclick="toggleMenu()">
        ☰
    </div>

</div>

<!-- CONTENIDO -->
<div class="container">

    <h2>➕ Nuevo Estudiante</h2>

    <form th:action="@{/estudiantes/guardar}" th:object="${estudiante}" method="post">

        <!-- NOMBRE -->
        <label>Nombre:</label><br>
        <input type="text" th:field="*{nombre}" placeholder="Ingrese nombre" required>
        <br><br>

        <!-- EMAIL -->
        <label>Email:</label><br>
        <input type="email" th:field="*{email}" placeholder="Ingrese email" required>
        <br><br>

        <!-- ✅ CURSO -->
        <label>Curso:</label><br>
        <select th:field="*{curso.id}" required>
            <option value="">-- Seleccionar Curso --</option>
            <option th:each="c : ${cursos}"
                    th:value="${c.id}"
                    th:text="${c.nombre}">
            </option>
        </select>
        <br><br>

        <!-- BOTONES -->
        <button type="submit" class="btn">💾 Guardar</button>
        <a th:href="@{/estudiantes}" class="btn">⬅ Volver</a>

    </form>

</div>

<!-- SCRIPT MENU -->
<script>
function toggleMenu() {
    document.getElementById("navLinks").classList.toggle("active");
}
</script>

</body>
</html>
