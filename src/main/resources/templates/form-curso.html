<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Formulario Curso</title>

	<!-- css -->
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    
    <!-- bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- sweet alert -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">

    <div class="logo">
        📚 EduManager
    </div>

    <div class="nav-links" id="navLinks">
        <a th:href="@{/cursos}">Cursos</a>
        <a th:href="@{/estudiantes}">Estudiantes</a>
        <a th:href="@{/cursos/nuevo}">Nuevo Curso</a>
        <a th:href="@{/estudiantes/nuevo}">Nuevo Estudiante</a>
        <a th:href="@{/logout}" class="btn-logout">Salir</a>
    </div>

    <div class="menu-toggle" onclick="toggleMenu()">
        ☰
    </div>

</div>
    <h2>EduManager</h2>
    <div>
        <a href="/cursos" class="btn">Cursos</a>
        <a href="/estudiantes" class="btn">Estudiantes</a>
    </div>
</div>

<div id="loading-overlay">
    <div class="spinner"></div>
</div>

<div class="container">
    <h1 th:text="${curso.id != null} ? 'Editar Curso' : 'Nuevo Curso'"></h1>

    <form th:action="@{/cursos/guardar}" method="post" 
          th:object="${curso}">

        <input type="hidden" th:field="*{id}">

        <input type="text" th:field="*{nombre}" placeholder="Nombre del curso">
        <input type="text" th:field="*{descripcion}" placeholder="Descripción">

        <button type="submit">Guardar</button>
    </form>
</div>

<script th:src="@{/js/script.js}"></script>

</body>
</html>
